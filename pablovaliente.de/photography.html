<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pablo Valiente González – Fotograf, Videograf &amp; Drohnenpilot | Deutschland</title>
<meta name="description" content="Pablo Valiente González – Freelance Photographer, Videographer &amp; EU-certified Drone Pilot based in Germany."/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<script>
(function(){
  var s = document.createElement('script');
  s.src = 'https://player.vimeo.com/api/player.js';
  s.async = true;
  s.onload = function(){ window._vimeoReady = true; document.dispatchEvent(new Event('vimeo:ready')); };
  document.head.appendChild(s);
})();
</script>

<style>
  :root {
    --bg:     #ffffff;
    --black:  #0C0C0B;
    --white:  #FFFFFF;
    --ease:   cubic-bezier(0.16, 1, 0.3, 1);
    --radius: 8px;
    --card-w: min(70vw, 984px);
    --card-h: calc(var(--card-w) * 9 / 16);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :focus-visible { outline: 2px solid #A8895A; outline-offset: 3px; }
  html, body { width: 100%; height: 100%; }
  body { font-family: 'Syne', sans-serif; background: var(--bg); -webkit-font-smoothing: antialiased; cursor: none; overflow: hidden; }

  #cur-arrow {
    position: fixed; z-index: 9999; pointer-events: none;
    transform: translate(-2px,-2px); transition: opacity .2s;
    will-change: left, top; opacity: 0;
  }
  #cur-arrow.is-ready { opacity: 1; }
  #cur-open {
    position: fixed; z-index: 9999; width: 68px; height: 68px; border-radius: 50%;
    background: var(--black); pointer-events: none;
    transform: translate(-50%,-50%) scale(0); transition: transform .3s var(--ease);
    display: flex; align-items: center; justify-content: center;
  }
  #cur-open span { font-size: 8px; font-weight: 800; letter-spacing: .25em; text-transform: uppercase; color: var(--white); }
  body.on-card #cur-arrow { opacity: 0; }
  body.on-card #cur-open  { transform: translate(-50%,-50%) scale(1); }
  body.on-interactive #cur-arrow { opacity: 0; }
  body.on-interactive #cur-open  { transform: translate(-50%,-50%) scale(.2); }
  body.on-interactive #cur-open span { display: none; }

  .grain {
    position: fixed; inset: 0; z-index: 9990; pointer-events: none; opacity: .025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 120px; animation: gr .35s steps(1) infinite;
  }
  @keyframes gr {
    0%  { transform: translate(0,0);    } 25% { transform: translate(-3%,2%);  }
    50% { transform: translate(2%,-3%); } 75% { transform: translate(-2%,3%);  }
  }

  .stage {
    position: fixed; inset: 0; z-index: 500;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .stage > *, .slider-col { pointer-events: auto; }

  .slider-col {
    position: relative;
    width: 100vw;
    height: var(--card-h);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    pointer-events: auto;
    opacity: 0;
    animation: fadeInUp .9s var(--ease) .2s forwards;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .slider-track {
    display: flex;
    align-items: center;
    gap: 24px;
    position: absolute; top: 0; left: 0; height: 100%;
    will-change: transform;
  }

  .card-wrap {
    flex-shrink: 0;
    width: var(--card-w); height: var(--card-h);
    transform: scale(.73); opacity: .55;
    transition: transform .75s var(--ease), opacity .5s var(--ease);
    transform-origin: center center;
    will-change: transform;
  }
  .card-wrap.is-active { transform: scale(1); opacity: 1; }

  .card {
    position: relative; width: 100%; aspect-ratio: 16 / 9;
    border-radius: var(--radius); overflow: hidden; background: #1a1510;
    cursor: none; transform: translateZ(0); backface-visibility: hidden; will-change: transform;
  }
  .video-layer { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
  .video-layer iframe {
    position: absolute; inset: 0; width: 100%; height: 100%; border: 0;
    transform: scale(1.02); opacity: 1;
  }
  .card__overlay {
    position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background: linear-gradient(to bottom, rgba(0,0,0,0) 40%, rgba(0,0,0,.6) 100%);
    opacity: 0; transition: opacity .5s;
  }
  .card.is-active .card__overlay { opacity: 1; }

  .card__carousel { position: absolute; inset: 0; }
  .card__carousel-frame {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; transform: scale(1.02);
    opacity: 0; transition: opacity 1.1s ease;
    pointer-events: none; will-change: opacity;
  }
  .card__carousel-frame.is-active { opacity: 1; }

  @media (max-width: 1024px) {
    #cur-arrow, #cur-open { display: none !important; }
    body { cursor: auto; }
    .card { cursor: pointer; }
    :root { --card-w: 82vw; }
    .slider-col { width: 82vw; height: 100vh; overflow: visible; display: flex; align-items: center; justify-content: center; perspective: 1200px; }
    .slider-track { position: relative; width: 100%; transform: none !important; transition: none !important; transform-style: preserve-3d; }
    .card-wrap { position: absolute; top: 50%; left: 0; right: 0; transform: translateY(-50%) translateY(60px) scale(0.78) rotateX(18deg); opacity: 0; transition: transform .7s var(--ease), opacity .55s var(--ease); transform-origin: center bottom; }
    .card-wrap.is-active { position: relative; top: auto; transform: translateY(0) scale(1) rotateX(0deg); opacity: 1; pointer-events: auto; z-index: 10; }
    .card-wrap.is-prev { transform: translateY(-50%) translateY(-42%) scale(0.82) rotateX(-22deg); opacity: 0.55; z-index: 5; }
    .card-wrap.is-next { transform: translateY(-50%) translateY(42%) scale(0.82) rotateX(22deg); opacity: 0.55; z-index: 5; }
  }
</style>
</head>
<body class="antialiased">

<div class="grain" aria-hidden="true"></div>

<div id="cur-arrow" aria-hidden="true">
  <svg width="11" height="11" viewBox="0 0 11 11"><polygon points="0,0 0,11 11,0" fill="#0C0C0B" stroke="#fff" stroke-width="1.2"/></svg>
</div>
<div id="cur-open" aria-hidden="true"><span>Open</span></div>

<header class="fixed top-0 w-full z-[600] bg-white" id="unified-header">
  <nav class="w-full flex items-center py-6 md:py-8 justify-between px-4 md:px-6 lg:px-10">
    <a href="index.html" class="font-['Syne'] text-[11px] font-bold tracking-[0.25em] text-black uppercase hover:opacity-70 transition-opacity">PABLO VALIENTE</a>
    <div class="hidden lg:flex space-x-6">
      <a class="font-['Syne'] uppercase tracking-[0.2em] text-[9px] font-bold text-black/60 hover:text-black transition-colors" href="film.html">FILM</a>
      <a class="font-['Syne'] uppercase tracking-[0.2em] text-[9px] font-bold text-black/60 hover:text-black transition-colors" href="commercial.html">COMMERCIAL</a>
      <a class="font-['Syne'] uppercase tracking-[0.2em] text-[9px] font-bold text-black/60 hover:text-black transition-colors" href="photography-monasterio.html">PHOTOGRAPHY</a>
      <a class="font-['Syne'] uppercase tracking-[0.2em] text-[9px] font-bold text-black/60 hover:text-black transition-colors" href="contact.html">CONTACT</a>
    </div>
  </nav>
</header>

<main>
<div class="stage">
  <div class="slider-col" id="sliderCol" role="region" aria-label="Portfolio">
    <div class="slider-track" id="track">
      <div class="card-wrap" data-cover="1169718635" data-href="film.html">
        <div class="card"><div class="video-layer"></div><div class="card__overlay"></div></div>
      </div>
      <div class="card-wrap" data-cover="1170251945" data-href="film-colorgrading.html">
        <div class="card"><div class="video-layer"></div><div class="card__overlay"></div></div>
      </div>
      <div class="card-wrap" data-cover="1169718441" data-href="commercial.html">
        <div class="card"><div class="video-layer"></div><div class="card__overlay"></div></div>
      </div>
      <div class="card-wrap" data-cover="" data-href="photography-monasterio.html">
        <div class="card" style="background:#120f0c">
          <div class="card__carousel" id="carouselMonasterio">
            <img class="card__carousel-frame is-active" src="assets/carrusel/project-01/frame-01.webp" alt="P1"/>
            <img class="card__carousel-frame"           src="assets/carrusel/project-01/frame-02.webp" alt="P2"/>
            <img class="card__carousel-frame"           src="assets/carrusel/project-01/frame-03.webp" alt="P3"/>
          </div>
          <div class="video-layer"></div><div class="card__overlay"></div>
        </div>
      </div>
    </div>
  </div>
</div>
</main>

<script>
'use strict';

const curArrow = document.getElementById('cur-arrow');
const curOpen  = document.getElementById('cur-open');
let mx = 0, my = 0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  curArrow.style.left = mx + 'px'; curArrow.style.top = my + 'px';
  curOpen.style.left  = mx + 'px'; curOpen.style.top  = my + 'px';
  curArrow.classList.add('is-ready');
});

const track  = document.getElementById('track');
const col    = document.getElementById('sliderCol');
const INTERVAL = 5000;
const realCards = Array.from(track.querySelectorAll('.card-wrap'));
const N = realCards.length;

// Loop Clones
realCards.forEach(c => { const ce = c.cloneNode(true); ce.classList.add('clone'); track.appendChild(ce); });
realCards.forEach(c => { const cs = c.cloneNode(true); cs.classList.add('clone'); track.insertBefore(cs, track.firstChild); });

const allCards = Array.from(track.querySelectorAll('.card-wrap'));
const OFFSET   = N;
let vCurrent   = OFFSET;
let timer      = null;
let isAnim     = false;

function isMobileSlider() { return window.innerWidth <= 1024; }

function _spawnCover(c) {
  const id = c.dataset.cover;
  if (!id) return;
  const vl = c.querySelector('.video-layer');
  if (!vl || vl.querySelector('iframe')) return;
  if (!window._vimeoReady) {
    document.addEventListener('vimeo:ready', () => _spawnCover(c), { once: true });
    return;
  }
  const ifr = document.createElement('iframe');
  ifr.src = `https://player.vimeo.com/video/${id}?background=1&autoplay=1&loop=1&muted=1&autopause=0&quality=720p`;
  ifr.setAttribute('aria-hidden', 'true');
  vl.appendChild(ifr);
  new Vimeo.Player(ifr).play().catch(() => {});
}

function updateActive(v) {
  allCards.forEach((c, idx) => {
    const active = idx === v;
    c.classList.toggle('is-active', active);
    c.querySelector('.card')?.classList.toggle('is-active', active);
    if (isMobileSlider()) {
      c.classList.remove('is-prev', 'is-next');
      if (idx === v - 1) c.classList.add('is-prev');
      if (idx === v + 1) c.classList.add('is-next');
    }
  });
}

function getTranslateX(v) {
  const colW = col.offsetWidth;
  let off = 0;
  for (let i = 0; i < v; i++) off += allCards[i].offsetWidth + 24;
  return -(off - (colW / 2 - allCards[v].offsetWidth / 2));
}

function goTo(v, animated = true) {
  if (isAnim && animated) return;
  isAnim = animated;
  vCurrent = v;
  updateActive(v);
  resetTimer();
  if (!isMobileSlider()) {
    track.style.transition = animated ? 'transform .75s cubic-bezier(.16,1,.3,1)' : 'none';
    track.style.transform  = `translateX(${getTranslateX(v)}px)`;
  } else {
    track.style.transition = 'none';
    track.style.transform  = 'none';
    if (animated) setTimeout(() => { isAnim = false; checkJump(); }, 720);
    else isAnim = false;
  }
}

function checkJump() {
  if (vCurrent < OFFSET)           goTo(vCurrent + N, false);
  else if (vCurrent >= OFFSET + N) goTo(vCurrent - N, false);
}

track.addEventListener('transitionend', e => {
  if (e.propertyName !== 'transform') return;
  isAnim = false;
  checkJump();
});

function resetTimer() {
  clearInterval(timer);
  timer = setInterval(() => goTo(vCurrent + 1), INTERVAL);
}

// Trackpad
let isWheeling = false;
col.addEventListener('wheel', e => {
  e.preventDefault();
  if (isWheeling || isAnim) return;
  const delta = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
  if (Math.abs(delta) > 15) {
    isWheeling = true;
    goTo(delta > 0 ? vCurrent + 1 : vCurrent - 1);
    setTimeout(() => { isWheeling = false; }, 600); 
  }
}, { passive: false });

// Keyboard Arrows
document.addEventListener('keydown', e => {
  if (['ArrowRight', 'ArrowDown'].includes(e.key)) goTo(vCurrent + 1);
  if (['ArrowLeft', 'ArrowUp'].includes(e.key))    goTo(vCurrent - 1);
});

// Click navigation
document.addEventListener('click', e => {
  if (e.target.closest('header, button')) return;
  const rect = allCards[vCurrent].querySelector('.card').getBoundingClientRect();
  if (mx >= rect.left && mx <= rect.right && my >= rect.top && my <= rect.bottom) {
    const h = allCards[vCurrent].dataset.href; if (h) window.location.href = h;
  } else {
    goTo(mx < window.innerWidth / 2 ? vCurrent - 1 : vCurrent + 1);
  }
});

window.addEventListener('load', () => { 
  goTo(OFFSET, false); 
  allCards.forEach(c => _spawnCover(c)); 
});
window.addEventListener('resize', () => goTo(vCurrent, false));

// Photo Carousel
requestAnimationFrame(() => {
  document.querySelectorAll('.card__carousel').forEach(carousel => {
    const frames = Array.from(carousel.querySelectorAll('.card__carousel-frame'));
    if (frames.length < 2) return;
    let cur = 0;
    setInterval(() => {
      frames[cur].classList.remove('is-active');
      cur = (cur + 1) % frames.length;
      frames[cur].classList.add('is-active');
    }, 2800);
  });
});
</script>
</body>
</html>
