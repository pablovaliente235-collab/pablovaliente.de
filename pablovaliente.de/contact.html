<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Pablo Valiente | Contact</title>
    <meta name="description" content="Contact Pablo Valiente González — Filmmaker, Photographer &amp; Drone Pilot based in Germany."/>
    <link rel="canonical" href="https://pablovaliente.me/contact"/>
    <link rel="stylesheet" href="dist/output.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Manrope:wght@300;400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>


    <style>
        body { background-color: #f9f9f9; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

        /* ── Form inputs ── */
        .form-field {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(0,0,0,0.12);
            padding: 14px 0;
            font-family: 'Manrope', sans-serif;
            font-size: 13px;
            font-weight: 400;
            color: #1a1c1c;
            outline: none;
            transition: border-color 0.3s ease;
            -webkit-appearance: none;
            border-radius: 0;
        }
        .form-field::placeholder {
            font-family: 'Syne', sans-serif;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(0,0,0,0.3);
        }
        .form-field:focus {
            border-bottom-color: #000;
        }
        textarea.form-field {
            resize: none;
            min-height: 120px;
        }

        /* ── Submit button ── */
        .btn-submit {
            display: inline-block;
            font-family: 'Syne', sans-serif;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #fff;
            background: #000;
            border: none;
            padding: 16px 32px;
            cursor: pointer;
            transition: background 0.3s ease, color 0.3s ease;
        }
        .btn-submit:hover {
            background: #474747;
        }
        .btn-submit:disabled {
            background: #aeaeae;
            cursor: not-allowed;
        }
        .btn-submit.success {
            background: #1a1c1c;
        }
        .btn-submit.error-state {
            background: #ba1a1a;
        }

        /* ── Mobile menu ── */
        @media (max-width: 1023px) {
            .mobile-menu-open { overflow: hidden; }
            #mobile-overlay { position:fixed !important; top:0 !important; left:0 !important; width:100vw !important; height:100dvh !important; overflow:hidden !important; }
        }
        @media (hover: none) and (pointer: coarse) {
            a:hover, button:hover { color: inherit !important; }
        }

        /* ── Divider line ── */
        .section-divider {
            width: 100%;
            height: 1px;
            background: rgba(0,0,0,0.06);
        }

        /* ── Status message ── */
        #status-msg {
            font-family: 'Syne', sans-serif;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            display: none;
        }
        #status-msg.show { display: inline-block; }
        #status-msg.success { color: #1a1c1c; }
        #status-msg.error-msg { color: #ba1a1a; }
    </style>

    <!-- EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function(){
            emailjs.init({ publicKey: "f5f_LJsdJwsqdCqjn" });
        })();
    </script>
</head>

<body class="antialiased selection:bg-primary selection:text-white">

    <!-- ══════════ HEADER ══════════ -->
    <header class="fixed top-0 w-full z-[60] bg-[#f9f9f9] shadow-none" id="unified-header">
        <nav class="w-full flex items-center pt-5 pb-2 md:pt-6 md:pb-3 justify-between px-4 md:px-6 lg:px-10">
            <a href="index.html" class="font-['Syne'] text-[11px] font-bold tracking-[0.25em] text-black uppercase hover:opacity-70 transition-opacity">PABLO VALIENTE</a>
            <div class="hidden lg:flex space-x-6">
                <a class="font-['Syne'] uppercase tracking-[0.2em] text-[9px] font-bold leading-tight antialiased text-black/60 hover:text-black transition-colors duration-300" href="film.html">FILM</a>
                <a class="font-['Syne'] uppercase tracking-[0.2em] text-[9px] font-bold leading-tight antialiased text-black/60 hover:text-black transition-colors duration-300" href="commercial.html">COMMERCIAL</a>
                <a class="font-['Syne'] uppercase tracking-[0.2em] text-[9px] font-bold leading-tight antialiased text-black/60 hover:text-black transition-colors duration-300" href="photography-monasterio.html">PHOTOGRAPHY</a>
                <a class="font-['Syne'] uppercase tracking-[0.2em] text-[9px] font-bold leading-tight antialiased text-black border-b border-black pb-1 transition-colors duration-300" href="contact.html">CONTACT</a>
            </div>
            <button class="lg:hidden flex items-center justify-center w-8 h-8" id="mobile-menu-btn" aria-label="Open menu" aria-expanded="false">
                <span class="material-symbols-outlined text-black" style="font-size:16px">menu</span>
            </button>
        </nav>
        <!-- Mobile overlay -->
        <div class="fixed inset-0 bg-[#f9f9f9] z-[70] hidden flex-col items-center justify-center" id="mobile-overlay">
            <button class="absolute top-6 right-4 w-11 h-11 flex items-center justify-center focus:outline-none" id="close-menu-btn">
                <span class="material-symbols-outlined text-black" style="font-size:16px">close</span>
            </button>
            <div class="flex flex-col items-center space-y-6 pt-[80px]">
                <a class="font-['Syne'] uppercase tracking-[0.2em] text-[11px] font-bold py-3 px-6" href="film.html" style="color:rgba(0,0,0,0.4);">FILM</a>
                <a class="font-['Syne'] uppercase tracking-[0.2em] text-[11px] font-bold py-3 px-6" href="commercial.html" style="color:rgba(0,0,0,0.4);">COMMERCIAL</a>
                <a class="font-['Syne'] uppercase tracking-[0.2em] text-[11px] font-bold py-3 px-6" href="photography-monasterio.html" style="color:rgba(0,0,0,0.4);">PHOTOGRAPHY</a>
                <a class="font-['Syne'] uppercase tracking-[0.2em] text-[11px] font-bold py-3 px-6 border-b border-black pb-1" href="contact.html" style="color:#000000;">CONTACT</a>
            </div>
        </div>
        <!-- Bottom border line matching other pages -->
        <div class="section-divider"></div>
    </header>

    <!-- ══════════ MAIN ══════════ -->
    <main class="px-4 md:px-6 lg:px-20 max-w-screen-2xl mx-auto pt-20 md:pt-28 lg:pt-40 pb-4 md:pb-16 lg:pb-24">

        <!-- Title row -->
        <div class="mb-5 md:mb-14 lg:mb-20">
            <p class="font-['Syne'] text-[9px] font-bold tracking-[0.3em] uppercase text-neutral-400 mb-1 md:mb-3">GET IN TOUCH</p>
            <h1 class="font-['Syne'] text-[28px] md:text-[44px] lg:text-[56px] font-bold tracking-[-0.03em] text-black uppercase leading-none">Let's work<br/>together.</h1>
        </div>

        <!-- Content grid -->
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-6 md:gap-14 lg:gap-24">

            <!-- Left column: info — 2-col grid on mobile para compactar -->
            <div class="lg:col-span-2">
                <div class="grid grid-cols-2 lg:flex lg:flex-col gap-x-6 gap-y-4 lg:gap-10">

                    <!-- LOCATION: fila completa en mobile -->
                    <div class="col-span-2 lg:col-span-1">
                        <p class="font-['Syne'] text-[9px] font-bold tracking-[0.3em] uppercase text-neutral-400 mb-2 md:mb-3">LOCATION</p>
                        <div class="flex gap-4 lg:flex-col lg:gap-3">
                            <div>
                                <p class="font-['Syne'] text-[8px] font-bold tracking-[0.2em] uppercase text-black/30 mb-0.5">Germany</p>
                                <p class="font-['Manrope'] text-[12px] md:text-[13px] text-black/70">Berlin &amp; Frankfurt</p>
                            </div>
                            <div>
                                <p class="font-['Syne'] text-[8px] font-bold tracking-[0.2em] uppercase text-black/30 mb-0.5">Spain</p>
                                <p class="font-['Manrope'] text-[12px] md:text-[13px] text-black/70">Madrid &amp; Ibiza</p>
                            </div>
                        </div>
                    </div>

                    <!-- EMAIL -->
                    <div>
                        <p class="font-['Syne'] text-[9px] font-bold tracking-[0.3em] uppercase text-neutral-400 mb-0.5 md:mb-3">EMAIL</p>
                        <!-- email_off --><a href="mailto:contact@pablovaliente.me" class="font-['Manrope'] text-[12px] md:text-[13px] text-black hover:text-neutral-500 transition-colors duration-300 break-all">contact@pablovaliente.me</a><!-- /email_off -->
                    </div>

                </div>
            </div>

            <!-- Right column: form -->
            <div class="lg:col-span-3">
                <form id="contact-form" novalidate>

                    <div class="grid grid-cols-2 gap-x-4 md:gap-x-8">
                        <div>
                            <input
                                name="first_name"
                                id="first-name"
                                type="text"
                                placeholder="First name"
                                required
                                autocomplete="given-name"
                                class="form-field"/>
                        </div>
                        <div>
                            <input
                                name="last_name"
                                id="last-name"
                                type="text"
                                placeholder="Last name"
                                required
                                autocomplete="family-name"
                                class="form-field"/>
                        </div>
                    </div>

                    <div class="mt-3 md:mt-6">
                        <input
                            name="email"
                            id="email"
                            type="email"
                            placeholder="Email address"
                            required
                            autocomplete="email"
                            class="form-field"/>
                    </div>

                    <div class="mt-3 md:mt-6">
                        <input
                            name="subject"
                            id="subject"
                            type="text"
                            placeholder="Subject / Inquiry"
                            required
                            class="form-field"/>
                    </div>

                    <div class="mt-3 md:mt-6">
                        <textarea
                            name="message"
                            id="message"
                            placeholder="Your message"
                            required
                            rows="4"
                            class="form-field"
                            style="min-height: 80px"></textarea>
                    </div>

                    <div class="mt-6 md:mt-10 flex items-center gap-6 flex-wrap">
                        <button type="submit" id="submit-btn" class="btn-submit">
                            SEND INQUIRY
                        </button>
                        <span id="status-msg"></span>
                    </div>

                </form>
            </div>

        </div>
    </main>

    <!-- ══════════ FOOTER ══════════ -->
    <footer class="w-full flex flex-col items-center justify-center py-4 md:py-8 lg:py-12 px-4 md:px-6 lg:px-20 bg-[#f9f9f9]">
        <div class="section-divider mb-8"></div>
        <div class="flex flex-wrap justify-center gap-x-6 gap-y-1 md:gap-x-12 mb-6">
            <a href="https://instagram.com/pvaliente_" target="_blank" rel="noopener noreferrer" class="font-['Syne'] text-[10px] md:text-[12px] tracking-widest uppercase text-neutral-500 hover:text-black transition-colors py-2 px-3 md:px-4">INSTAGRAM</a>
            <a href="https://www.behance.net/pvaliente" target="_blank" rel="noopener noreferrer" class="font-['Syne'] text-[10px] md:text-[12px] tracking-widest uppercase text-neutral-500 hover:text-black transition-colors py-2 px-3 md:px-4">BEHANCE</a>
            <a href="https://www.linkedin.com/in/valiente-pablo" target="_blank" rel="noopener noreferrer" class="font-['Syne'] text-[10px] md:text-[12px] tracking-widest uppercase text-neutral-500 hover:text-black transition-colors py-2 px-3 md:px-4">LINKEDIN</a>
        </div>
        <p class="font-['Syne'] text-[10px] tracking-widest uppercase text-neutral-600 text-center">
            &copy; <span id="footerYear"></span> PABLO VALIENTE. ALL RIGHTS RESERVED.
        </p>
    </footer>

    <script>
        document.getElementById('footerYear').textContent = new Date().getFullYear();

        // ── Mobile menu ──
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const closeMenuBtn  = document.getElementById('close-menu-btn');
        const mobileOverlay = document.getElementById('mobile-overlay');
        function openMenu()  { mobileOverlay.classList.remove('hidden'); mobileOverlay.classList.add('flex'); mobileMenuBtn.setAttribute('aria-expanded','true');  document.body.classList.add('mobile-menu-open'); }
        function closeMenu() { mobileOverlay.classList.add('hidden');    mobileOverlay.classList.remove('flex'); mobileMenuBtn.setAttribute('aria-expanded','false'); document.body.classList.remove('mobile-menu-open'); }
        mobileMenuBtn.addEventListener('click', openMenu);
        closeMenuBtn.addEventListener('click',  closeMenu);
        mobileOverlay.querySelectorAll('a').forEach(a => a.addEventListener('click', closeMenu));

        // ── EmailJS form ──
        document.getElementById('contact-form').addEventListener('submit', function(event) {
            event.preventDefault();

            const submitBtn = document.getElementById('submit-btn');
            const statusMsg = document.getElementById('status-msg');

            // Disable button while sending
            submitBtn.textContent = 'SENDING...';
            submitBtn.disabled = true;
            statusMsg.className = '';
            statusMsg.style.display = 'none';

            emailjs.sendForm('service_21cxd0d', 'template_l6336q9', this)
                .then(() => {
                    submitBtn.textContent = 'SENT ✓';
                    submitBtn.classList.add('success');
                    statusMsg.textContent = 'Message sent — I\'ll be in touch soon.';
                    statusMsg.className = 'show success';

                    setTimeout(() => {
                        submitBtn.textContent = 'SEND INQUIRY';
                        submitBtn.classList.remove('success');
                        submitBtn.disabled = false;
                        statusMsg.className = '';
                        statusMsg.style.display = 'none';
                        document.getElementById('contact-form').reset();
                    }, 4000);
                })
                .catch((error) => {
                    console.error('EmailJS error:', error);
                    submitBtn.textContent = 'TRY AGAIN';
                    submitBtn.classList.add('error-state');
                    statusMsg.textContent = 'Something went wrong. Please email directly.';
                    statusMsg.className = 'show error-msg';

                    setTimeout(() => {
                        submitBtn.textContent = 'SEND INQUIRY';
                        submitBtn.classList.remove('error-state');
                        submitBtn.disabled = false;
                    }, 4000);
                });
        });
    </script>
</body>
</html>
