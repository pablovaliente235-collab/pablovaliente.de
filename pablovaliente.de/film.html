<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Pablo Valiente | Zufällige Begegnung</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Manrope:wght@300;400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: { "primary": "#000000", "background": "#f9f9f9", "surface-dim": "#dadada" },
              fontFamily: { "headline": ["Syne", "sans-serif"], "body": ["Manrope", "sans-serif"] }
            }
          }
        }
    </script>
    <style>
        .kinetic-scroll::-webkit-scrollbar { display: none; }
        .kinetic-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        @media (max-width: 1023px) {
            .nav-scroll { display: flex; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
            .nav-scroll::-webkit-scrollbar { display: none; }
            #mobile-overlay { position: fixed!important; inset: 0!important; width: 100vw!important; height: 100dvh!important; }
        }
    </style>
</head>
<body class="antialiased bg-[#f9f9f9]">
    <header class="fixed top-0 w-full z-[60] bg-[#f9f9f9]">
        <nav class="w-full flex items-center py-6 md:py-8 justify-between px-4 md:px-6 lg:px-10">
            <a href="index.html" class="font-['Syne'] text-[11px] font-bold tracking-[0.25em] text-black uppercase">PABLO VALIENTE</a>
            <button class="lg:hidden" id="mobile-menu-btn"><span class="material-symbols-outlined text-black">menu</span></button>
            <div class="hidden lg:flex space-x-6">
                <a class="font-['Syne'] uppercase tracking-[0.2em] text-[9px] font-bold text-black border-b border-black pb-1" href="film.html">FILM</a>
                <a class="font-['Syne'] uppercase tracking-[0.2em] text-[9px] font-bold text-black/60 hover:text-black" href="commercial.html">COMMERCIAL</a>
                <a class="font-['Syne'] uppercase tracking-[0.2em] text-[9px] font-bold text-black/60 hover:text-black" href="photography-monasterio.html">PHOTOGRAPHY</a>
                <a class="font-['Syne'] uppercase tracking-[0.2em] text-[9px] font-bold text-black/60 hover:text-black" href="contact.html">CONTACT</a>
            </div>
        </nav>
        <nav class="w-full flex lg:justify-center items-center py-4 px-4 nav-scroll border-t border-black/5 lg:border-none lg:space-x-16">
            <a class="font-['Syne'] uppercase tracking-[0.2em] font-bold text-black text-[9px] mr-8 lg:mr-0" href="film.html">ZUFÄLLIGE BEGEGNUNG</a>
            <a class="font-['Syne'] uppercase tracking-[0.2em] font-semibold text-neutral-400 hover:text-black text-[9px] mr-8 lg:mr-0" href="film-nichtschonwieder.html">NICHT SCHON WIEDER</a>
            <a class="font-['Syne'] uppercase tracking-[0.2em] font-semibold text-neutral-400 hover:text-black text-[9px]" href="film-colorgrading.html">COLOR GRADING</a>
        </nav>
    </header>

    <div id="mobile-overlay" class="fixed inset-0 bg-[#f9f9f9] z-[70] hidden flex-col items-center justify-center">
        <button class="absolute top-6 right-4" id="close-menu-btn"><span class="material-symbols-outlined text-black">close</span></button>
        <div class="flex flex-col items-center space-y-6">
            <a class="font-['Syne'] uppercase tracking-[0.2em] text-[11px] font-bold border-b border-black" href="film.html">FILM</a>
            <a class="font-['Syne'] uppercase tracking-[0.2em] text-[11px] font-bold text-black/40" href="commercial.html">COMMERCIAL</a>
            <a class="font-['Syne'] uppercase tracking-[0.2em] text-[11px] font-bold text-black/40" href="photography-monasterio.html">PHOTOGRAPHY</a>
            <a class="font-['Syne'] uppercase tracking-[0.2em] text-[11px] font-bold text-black/40" href="contact.html">CONTACT</a>
        </div>
    </div>

    <main class="px-4 md:px-6 lg:px-20 max-w-screen-2xl mx-auto pt-44 lg:pt-32 pb-4 lg:pb-8">
        <section class="mb-12 lg:mb-20">
            <div class="aspect-video w-full bg-black">
                <iframe src="https://player.vimeo.com/video/893321443?h=8c78c3a1b3&color=ffffff&title=0&byline=0&portrait=0" class="w-full h-full" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
            </div>
        </section>

        <section class="relative overflow-hidden mb-6 lg:mb-24">
            <div class="flex space-x-4 md:space-x-8 lg:space-x-12 overflow-x-auto kinetic-scroll snap-x snap-mandatory scroll-smooth pb-4" id="slider" style="outline: none;"></div>
            <div class="flex justify-between items-center border-t border-black/5 pt-4">
                <div class="flex space-x-6">
                    <button class="material-symbols-outlined text-neutral-400 hover:text-black" id="prevBtn">west</button>
                    <button class="material-symbols-outlined text-neutral-400 hover:text-black" id="nextBtn">east</button>
                </div>
                <div class="font-['Syne'] text-[10px] tracking-[0.2em] text-neutral-400 uppercase">ZUFÄLLIGE BEGEGNUNG | Kurzfilm</div>
            </div>
        </section>

        <section class="p-4 md:p-6 lg:p-12 bg-[#f3f3f4] mb-2 lg:mb-6" id="grid-container" data-path="/assets/film/project-1/frames" data-prefix="Film">
            <div class="grid grid-cols-2 lg:grid-cols-3 gap-4 lg:gap-8" id="film-grid"></div>
        </section>
    </main>

    <footer class="py-8 lg:py-16 flex flex-col items-center bg-[#f9f9f9]">
        <div class="flex space-x-8 mb-8 text-[12px] font-['Syne'] text-neutral-500">
            <a href="https://instagram.com/pvaliente_" target="_blank">INSTAGRAM</a>
            <a href="https://www.behance.net/pvaliente" target="_blank">BEHANCE</a>
        </div>
        <p class="text-[10px] font-['Syne'] text-neutral-600 uppercase">© <span id="year"></span> PABLO VALIENTE</p>
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
        const slider = document.getElementById('slider');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');

        const getScroll = () => slider.querySelector('.snap-center').clientWidth + parseInt(getComputedStyle(slider).gap);

        nextBtn.onclick = () => slider.scrollBy({ left: getScroll(), behavior: 'smooth' });
        prevBtn.onclick = () => slider.scrollBy({ left: -getScroll(), behavior: 'smooth' });

        slider.onclick = (e) => {
            const slide = e.target.closest('.snap-center');
            if(!slide) return;
            const rect = slide.getBoundingClientRect();
            const center = slider.getBoundingClientRect().left + slider.clientWidth/2;
            if(Math.abs(center - (rect.left + rect.width/2)) < rect.width/2) {
                (e.clientX - rect.left > rect.width/2) ? nextBtn.click() : prevBtn.click();
            } else {
                slider.scrollTo({ left: slide.offsetLeft - slider.clientWidth/2 + slide.clientWidth/2, behavior: 'smooth' });
            }
        };

        // Auto-load Images
        (async function() {
            const path = document.getElementById('grid-container').dataset.path;
            const grid = document.getElementById('film-grid');
            for(let i=1; i<=30; i++) {
                const src = `${path}/frame-${String(i).padStart(2,'0')}.webp`;
                const img = new Image();
                img.src = src;
                const exists = await new Promise(r => { img.onload=()=>r(true); img.onerror=()=>r(false); });
                if(!exists) break;
                
                slider.innerHTML += `<div class="min-w-[92vw] md:min-w-[80vw] lg:min-w-[65vw] snap-center relative"><div class="aspect-video overflow-hidden bg-surface-dim"><img class="w-full h-full object-cover" src="${src}"></div></div>`;
                grid.innerHTML += `<div class="aspect-video overflow-hidden bg-white"><img class="w-full h-full object-cover hover:scale-105 transition-transform duration-700" src="${src}" loading="lazy"></div>`;
            }
        })();

        // Menu
        document.getElementById('mobile-menu-btn').onclick = () => document.getElementById('mobile-overlay').classList.remove('hidden');
        document.getElementById('close-menu-btn').onclick = () => document.getElementById('mobile-overlay').classList.add('hidden');
    </script>
</body>
</html>
