    <style>
        body { background-color: #f9f9f9; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .kinetic-scroll::-webkit-scrollbar { display: none; }
        .kinetic-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        @media (max-width: 1023px) {
            .mobile-menu-open { overflow: hidden; }
            .nav-scroll { display: flex; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
            .nav-scroll::-webkit-scrollbar { display: none; }
            #mobile-overlay { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100dvh !important; overflow: hidden !important; }
        }

        @media (max-width: 767px) {
            #slider ~ div span { font-size: 8px !important; letter-spacing: 0.1em !important; display: inline !important; }
            #prevBtn, #nextBtn { width: 32px !important; height: 32px !important; font-size: 18px !important; }
        }

        @media (min-width: 768px) and (max-width: 1023px) {
            #photography-grid .grid-item:last-child:nth-child(odd) { grid-column: span 2; }

<body class="antialiased selection:bg-primary selection:text-white">
    <header class="fixed top-0 w-full z-[60] bg-[#f9f9f9]" id="unified-header">
        <nav class="w-full flex items-center py-6 md:py-8 justify-between px-4 md:px-6 lg:px-10">
            <a href="index.html" class="font-['Syne'] text-[11px] font-bold tracking-[0.25em] text-black uppercase">PABLO VALIENTE</a>
            <div class="hidden lg:flex space-x-6">
                <a class="font-['Syne'] uppercase tracking-[0.2em] text-[9px] font-bold text-black/60 hover:text-black transition-colors" href="film.html">FILM</a>
                <a class="font-['Syne'] uppercase tracking-[0.2em] text-[9px] font-bold text-black/60 hover:text-black transition-colors" href="commercial.html">COMMERCIAL</a>
                <a class="font-['Syne'] uppercase tracking-[0.2em] text-[9px] font-bold text-black border-b border-black pb-1" href="photography-monasterio.html">PHOTOGRAPHY</a>
                <a class="font-['Syne'] uppercase tracking-[0.2em] text-[9px] font-bold text-black/60 hover:text-black transition-colors" href="contact.html">CONTACT</a>
            </div>
            <button class="lg:hidden flex items-center justify-center w-11 h-11" id="mobile-menu-btn">
                <span class="material-symbols-outlined text-black scale-125">menu</span>
            </button>
        </nav>

        <nav class="w-full flex lg:justify-center items-center py-4 px-4 md:px-6 nav-scroll border-t border-black/5 lg:border-none lg:space-x-16">
            <a class="font-['Syne'] uppercase tracking-[0.2em] font-semibold text-neutral-400 hover:text-black transition-all text-[9px] mr-8 lg:mr-0" href="photography-monasterio.html">MONASTERIO DE SAN MIGUEL</a>
            <a class="font-['Syne'] uppercase tracking-[0.2em] font-semibold text-neutral-400 hover:text-black transition-all text-[9px] mr-8 lg:mr-0" href="photography-nature-tradition.html">NATURE & TRADITION</a>
            <a class="font-['Syne'] uppercase tracking-[0.2em] font-bold text-black text-[9px] mr-8 lg:mr-0" href="photography-bellamarhotel.html">BELLAMAR HOTEL</a>
            <a class="font-['Syne'] uppercase tracking-[0.2em] font-semibold text-neutral-400 hover:text-black transition-all text-[9px] mr-8 lg:mr-0" href="photography-winterlandschaft.html">WINTERLANDSCHAFT</a>
            <a class="font-['Syne'] uppercase tracking-[0.2em] font-semibold text-neutral-400 hover:text-black transition-all text-[9px] mr-8 lg:mr-0" href="photography-iglesiadeyaguaron.html">IGLESIA DE YAGUARÓN</a>
            <a class="font-['Syne'] uppercase tracking-[0.2em] font-semibold text-neutral-400 hover:text-black transition-all text-[9px] pr-4 lg:pr-0" href="photography-schrebergarten.html">SCHREBERGÄRTEN</a>
        </nav>
    </header>

    <main class="px-4 md:px-6 lg:px-20 max-w-screen-2xl mx-auto pt-44 lg:pt-32 pb-6">
        <section class="relative overflow-hidden mb-16 lg:mb-24">
            <div class="flex space-x-4 md:space-x-8 lg:space-x-12 overflow-x-auto kinetic-scroll snap-x snap-mandatory scroll-smooth pb-4" id="slider">
                <script>
                    const sliderDiv = document.getElementById('slider');
                    for (let i = 1; i <= 13; i++) {
                        const frameNum = i.toString().padStart(2, '0');
                        sliderDiv.innerHTML += `
                            <div class="min-w-[92vw] md:min-w-[80vw] lg:min-w-[65vw] snap-center">
                                <figure class="group cursor-pointer">
                                    <div class="aspect-[3/2] overflow-hidden bg-surface-dim">
                                        <img class="w-full h-full object-cover duration-700" src="assets/photography/project-3/frames/Frame-${frameNum}.webp"/>
                                    </div>
                                </figure>
                            </div>`;
                    }
                </script>
            </div>
            
            <div class="flex flex-row justify-between items-center border-t border-black/5 pt-4 mt-1">
                <div class="flex items-center space-x-6">
                    <button class="material-symbols-outlined text-neutral-400 hover:text-black transition-colors" id="prevBtn">west</button>
                    <button class="material-symbols-outlined text-neutral-400 hover:text-black transition-colors" id="nextBtn">east</button>
                </div>
                <div class="font-['Syne'] text-[10px] tracking-[0.2em] font-semibold text-neutral-400 uppercase text-right" id="slider-description-wrapper">
                    <span class="block lg:inline" style="color: #737373; font-family: Manrope; font-size: 11px; letter-spacing: 2px;">BELLAMAR HOTEL</span>
                    <span class="block lg:inline lg:ml-2" style="color: #737373; font-family: Manrope; font-size: 11px; letter-spacing: 2px;">Hospitality Photography</span>
                </div>
            </div>
        </section>

        <section class="p-4 md:p-6 lg:p-12 mb-6 bg-[#f3f3f4]">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 lg:gap-8" id="photography-grid">
                <script>
                    const gridDiv = document.getElementById('photography-grid');
                    for (let i = 1; i <= 13; i++) {
                        const frameNum = i.toString().padStart(2, '0');
                        gridDiv.innerHTML += `
                            <div class="grid-item group aspect-[3/2] overflow-hidden bg-surface-container-low">
                                <img class="w-full h-full object-cover hover:scale-105 transition-all duration-700 ease-in-out" src="assets/photography/project-3/frames/Frame-${frameNum}.webp"/>
                            </div>`;
                    }
                </script>
            </div>
        </section>
    </main>

    <footer class="w-full flex flex-col items-center justify-center py-16 bg-[#f9f9f9]">
        <div class="flex space-x-6 md:space-x-12 mb-8">
            <a href="https://instagram.com/pvaliente_" target="_blank" rel="noopener noreferrer" class="font-['Syne'] text-[12px] tracking-widest text-neutral-500 hover:text-black transition-colors">INSTAGRAM</a>
            <a href="https://www.behance.net/pvaliente" target="_blank" rel="noopener noreferrer" class="font-['Syne'] text-[12px] tracking-widest text-neutral-500 hover:text-black transition-colors">BEHANCE</a>
            <a href="https://www.linkedin.com/in/valiente-pablo" target="_blank" rel="noopener noreferrer" class="font-['Syne'] text-[12px] tracking-widest text-neutral-500 hover:text-black transition-colors">LINKEDIN</a>
        </div>
        <p class="font-['Syne'] text-[10px] tracking-widest text-neutral-600 uppercase">© 2024 PABLO VALIENTE. ALL RIGHTS RESERVED.</p>
    </footer>

    <script>
        // Lógica de Scroll y Menú igual a la referencia
        const slider = document.getElementById('slider');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const scrollAmount = () => slider.querySelector('.snap-center').clientWidth + 32;

        nextBtn.addEventListener('click', () => slider.scrollBy({ left: scrollAmount(), behavior: 'smooth' }));
        prevBtn.addEventListener('click', () => slider.scrollBy({ left: -scrollAmount(), behavior: 'smooth' }));

        // Auto-centrado del submenú
        (function() {
            const navScroll = document.querySelector('.nav-scroll');
            const activeLink = navScroll.querySelector('a.text-black');
            if (navScroll && activeLink) {
                navScroll.scrollLeft = activeLink.offsetLeft - (navScroll.offsetWidth / 2) + (activeLink.offsetWidth / 2);
            }
        })();
    </script>
</body>
</html>
