            <a href="https://www.behance.net/pvaliente" target="_blank" rel="noopener noreferrer" class="font-['Syne'] text-[12px] tracking-widest uppercase text-neutral-500 hover:text-black transition-colors py-2 px-4 whitespace-nowrap">BEHANCE</a>

    <script>
        document.getElementById('footerYear').textContent = new Date().getFullYear();

        const slider = document.getElementById('slider');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const closeMenuBtn = document.getElementById('close-menu-btn');
        const mobileOverlay = document.getElementById('mobile-overlay');

        const scrollAmount = () => {
            const item = slider.querySelector('.snap-center');
            if (!item) return 0;
            const itemWidth = item.clientWidth;
            const gap = parseInt(window.getComputedStyle(slider).gap) || 0;
            return itemWidth + gap;
        };

        nextBtn.addEventListener('click', () => slider.scrollBy({ left: scrollAmount(), behavior: 'smooth' }));
        prevBtn.addEventListener('click', () => slider.scrollBy({ left: -scrollAmount(), behavior: 'smooth' }));

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') slider.scrollBy({ left: scrollAmount(), behavior: 'smooth' });
            else if (e.key === 'ArrowLeft') slider.scrollBy({ left: -scrollAmount(), behavior: 'smooth' });
        });

        slider.addEventListener('click', (e) => {
            const slide = e.target.closest('.snap-center');
            if (!slide) return;

            const sliderRect = slider.getBoundingClientRect();
            const slideRect = slide.getBoundingClientRect();

            const sliderCenter = sliderRect.left + (sliderRect.width / 2);
            const slideCenter = slideRect.left + (slideRect.width / 2);

            const isCenterSlide = Math.abs(sliderCenter - slideCenter) < (slideRect.width / 2);

            if (isCenterSlide) {
                const clickX = e.clientX - slideRect.left;
                if (clickX > slideRect.width / 2) {
                    slider.scrollBy({ left: scrollAmount(), behavior: 'smooth' });
                } else {
                    slider.scrollBy({ left: -scrollAmount(), behavior: 'smooth' });
                }
            } else {
                const scrollTarget = slide.offsetLeft - (slider.clientWidth / 2) + (slide.clientWidth / 2);
                slider.scrollTo({ left: scrollTarget, behavior: 'smooth' });
            }
        });

        mobileMenuBtn.addEventListener('click', () => {
            mobileOverlay.classList.remove('hidden');
            document.body.classList.add('mobile-menu-open');
        });

        closeMenuBtn.addEventListener('click', () => {
            mobileOverlay.classList.add('hidden');
            document.body.classList.remove('mobile-menu-open');
        });

        mobileOverlay.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                mobileOverlay.classList.add('hidden');
                document.body.classList.remove('mobile-menu-open');
            });
        });

        slider.style.outline = 'none';

        // Autodetección
        (async function () {
            const container = document.getElementById('film-grid-container');
            if (!container) return;
            const grid = document.getElementById('film-grid');
            const projectPath = container.dataset.projectPath;
            const altPrefix = container.dataset.altPrefix;
            
            let i = 1;
            let keepChecking = true;

            while (keepChecking && i <= 100) {
                const n = String(i).padStart(2, '0');
                const imgSrc = `${projectPath}/frame-${n}.webp`;
                
                const checkImage = (src) => {
                    return new Promise((resolve) => {
                        const img = new Image();
                        img.onload = () => resolve(true);
                        img.onerror = () => resolve(false);
                        img.src = src;
                    });
                };

                const exists = await checkImage(imgSrc);

                if (exists) {
                    const sliderItem = document.createElement('div');
                    sliderItem.className = 'min-w-[92vw] md:min-w-[80vw] lg:min-w-[65vw] snap-center relative';
                    sliderItem.innerHTML = `
                        <figure class="group cursor-pointer">
                            <div class="aspect-video overflow-hidden bg-surface-dim">
                                <img class="w-full h-full object-cover duration-700" alt="${altPrefix} ${n}" src="${imgSrc}"/>
                            </div>
                        </figure>
                    `;
                    slider.appendChild(sliderItem);

                    const gridItem = document.createElement('div');
                    gridItem.className = 'grid-item group aspect-video overflow-hidden bg-surface-container-low';
                    gridItem.innerHTML = `<img class="w-full h-full object-cover hover:scale-105 transition-all duration-700 ease-in-out" src="${imgSrc}" alt="${altPrefix} ${n}" loading="lazy">`;
                    grid.appendChild(gridItem);
                    
                    i++;
                } else {
                    keepChecking = false;
                }
            }
        })();

        (function() {
            const navScroll = document.querySelector('.nav-scroll');
            const activeLink = navScroll ? navScroll.querySelector('a.text-black') : null;
            if (navScroll && activeLink) {
                navScroll.scrollLeft = activeLink.offsetLeft - (navScroll.offsetWidth / 2) + (activeLink.offsetWidth / 2);
            }
        })();
    </script>
</body>
