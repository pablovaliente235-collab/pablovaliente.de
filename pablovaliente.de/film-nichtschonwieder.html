    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Manrope:wght@300;400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { background-color: #f9f9f9; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .kinetic-scroll::-webkit-scrollbar { display: none; }
        .kinetic-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .vimeo-slide-wrap {
            position: relative; width: 100%; aspect-ratio: 16 / 9;
            overflow: hidden; background: #0f0f0f; cursor: pointer;
        }
        .vimeo-slide-wrap iframe {
            position: absolute; top: 50%; left: 50%;
            width: 102%; height: 102%;
            transform: translate(-50%, -50%);
            border: 0; pointer-events: none;
        }
        @media (max-width: 1023px) {
            .mobile-menu-open { overflow: hidden; }
            .nav-scroll { display:flex; overflow-x:auto; white-space:nowrap; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
            .nav-scroll::-webkit-scrollbar { display:none; }
            .nav-scroll a { flex:0 0 auto; }
            #mobile-overlay { position:fixed!important; top:0!important; left:0!important; width:100vw!important; height:100dvh!important; overflow:hidden!important; }
            #slider-description-wrapper { display:flex!important; flex-direction:column!important; justify-content:center!important; }
        }
        @media (max-width: 767px) {
            #slider ~ div span { font-size:8px!important; letter-spacing:0.1em!important; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:calc(100vw - 100px); display:inline!important; }
            #slider ~ div span + span::before { content:" "; white-space:pre; }
            #prevBtn, #nextBtn { width:32px!important; height:32px!important; font-size:18px!important; }
        }
        @media (hover: none) and (pointer: coarse) {
            .group:hover img { transform:none!important; }
            a:hover, button:hover { color:inherit!important; border-color:inherit!important; }
        }
        @media (min-width: 768px) {
            #photography-grid .grid-item:last-child:nth-child(odd) { grid-column:span 2; }
        }
    </style>
</head>
<body class="antialiased selection:bg-primary selection:text-white">

    <header class="fixed top-0 w-full z-[60] bg-[#f9f9f9] shadow-none" id="unified-header">
        <nav class="w-full flex items-center pt-5 pb-2 md:pt-6 md:pb-3 justify-between px-4 md:px-6 lg:px-10">
            <a href="index.html" class="font-['Syne'] text-[11px] font-bold tracking-[0.25em] text-black uppercase hover:opacity-70 transition-opacity">PABLO VALIENTE</a>
            <div class="hidden lg:flex space-x-6">
                <a class="font-['Syne'] uppercase tracking-[0.2em] text-[9px] font-bold leading-tight antialiased text-black border-b border-black pb-1 transition-colors duration-300" href="film.html">FILM</a>
                <a class="font-['Syne'] uppercase tracking-[0.2em] text-[9px] font-bold leading-tight antialiased text-black/60 hover:text-black transition-colors duration-300" href="commercial.html">COMMERCIAL</a>
                <a class="font-['Syne'] uppercase tracking-[0.2em] text-[9px] font-bold leading-tight antialiased text-black/60 hover:text-black transition-colors duration-300" href="photography-monasterio.html">PHOTOGRAPHY</a>
                <a class="font-['Syne'] uppercase tracking-[0.2em] text-[9px] font-bold leading-tight antialiased text-black/60 hover:text-black transition-colors duration-300" href="contact.html">CONTACT</a>
            </div>
            <button class="lg:hidden flex items-center justify-center w-8 h-8" id="mobile-menu-btn" aria-label="Open menu" aria-expanded="false">
                <span class="material-symbols-outlined text-black" style="font-size:16px">menu</span>
            </button>
        </nav>
        <div class="fixed inset-0 bg-[#f9f9f9] z-[70] hidden flex-col items-center justify-center" id="mobile-overlay">
            <button class="absolute top-6 right-4 w-11 h-11 flex items-center justify-center focus:outline-none" id="close-menu-btn">
                <span class="material-symbols-outlined text-black" style="font-size:16px">close</span>
            </button>
            <div class="flex flex-col items-center space-y-6 pt-[80px]">
                <a class="font-['Syne'] uppercase tracking-[0.2em] text-[11px] font-bold py-3 px-6 border-b border-black pb-1" href="film.html" style="color:#000000;">FILM</a>
                <a class="font-['Syne'] uppercase tracking-[0.2em] text-[11px] font-bold py-3 px-6" href="commercial.html" style="color:rgba(0,0,0,0.4);">COMMERCIAL</a>
                <a class="font-['Syne'] uppercase tracking-[0.2em] text-[11px] font-bold py-3 px-6" href="photography-monasterio.html" style="color:rgba(0,0,0,0.4);">PHOTOGRAPHY</a>
                <a class="font-['Syne'] uppercase tracking-[0.2em] text-[11px] font-bold py-3 px-6" href="contact.html" style="color:rgba(0,0,0,0.4);">CONTACT</a>
            </div>
        </div>
        <nav class="w-full flex lg:justify-center items-center py-4 px-4 md:px-6 nav-scroll border-t border-black/5 lg:border-none lg:space-x-16">
            <a class="font-['Syne'] uppercase tracking-[0.2em] font-semibold text-neutral-400 hover:text-black transition-all duration-300 text-[9px] mr-8 lg:mr-0" href="film.html">ZUFÄLLIGE BEGEGNUNG</a>
            <a class="font-['Syne'] uppercase tracking-[0.2em] font-bold text-black text-[9px] mr-8 lg:mr-0" href="film-nichtschonwieder.html">NICHT SCHON WIEDER</a>
            <a class="font-['Syne'] uppercase tracking-[0.2em] font-semibold text-neutral-400 hover:text-black transition-all duration-300 text-[9px] pr-4 lg:pr-0" href="film-colorgrading.html">PERDIDO EN UNA PERDIZ</a>
        </nav>
    </header>

    <main class="px-4 md:px-6 lg:px-20 max-w-screen-2xl mx-auto pt-28 lg:pt-32 pb-2">

        <section class="relative overflow-hidden mb-6 lg:mb-20">
            <div class="flex space-x-4 md:space-x-8 lg:space-x-12 overflow-x-auto overscroll-x-none kinetic-scroll snap-x snap-mandatory scroll-smooth pb-4" id="slider" style="outline:none;">
                <div class="min-w-[92vw] md:min-w-[80vw] lg:min-w-[65vw] snap-center flex-shrink-0">
                    <div class="vimeo-slide-wrap">
                        <iframe src="https://player.vimeo.com/video/1169380260?autoplay=1&loop=1&muted=1&background=1&autopause=0&controls=0&title=0&byline=0&portrait=0&dnt=1"
                            allow="autoplay; fullscreen; picture-in-picture" allowfullscreen title="Nicht schon wieder"></iframe>
                    </div>
                </div>
                <div class="min-w-[92vw] md:min-w-[80vw] lg:min-w-[65vw] snap-center flex-shrink-0">
                    <div class="vimeo-slide-wrap">
                        <iframe src="https://player.vimeo.com/video/1169955236?autoplay=1&loop=1&muted=1&background=1&autopause=0&controls=0&title=0&byline=0&portrait=0&dnt=1"
                            allow="autoplay; fullscreen; picture-in-picture" allowfullscreen title="Nicht schon wieder — Color Grade"></iframe>
                    </div>
                </div>
            </div>
            <div class="flex flex-row justify-between items-center border-t border-black/5 pt-4 mt-1">
                <div class="flex items-center space-x-6">
                    <button class="material-symbols-outlined text-neutral-400 hover:text-black transition-colors w-11 h-11 flex items-center justify-center" id="prevBtn">west</button>
                    <button class="material-symbols-outlined text-neutral-400 hover:text-black transition-colors w-11 h-11 flex items-center justify-center" id="nextBtn">east</button>
                </div>
                <div class="font-['Syne'] text-[10px] tracking-[0.2em] font-semibold text-neutral-400 uppercase text-right self-center" id="slider-description-wrapper">
                    <span class="block lg:inline" id="slide-label-title" style="color:rgb(115,115,115);font-family:Manrope;font-size:11px;font-weight:400;letter-spacing:2px;">NICHT SCHON WIEDER</span>
                    <span class="block lg:inline lg:ml-2" id="slide-label-sub" style="color:rgb(115,115,115);font-family:Manrope;font-size:11px;font-weight:400;letter-spacing:2px;">Personal Project</span>
                </div>
            </div>
        </section>

        <section 
            class="p-2 md:p-6 lg:p-12 shadow-sm mb-2 bg-[#f3f3f4]" 
            id="frames-section"
            data-project-path="assets/film/project-2/Frames"
            data-frame-ext="webp"
            data-alt-prefix="Nicht schon wieder"
            data-max-frames="8">
            <div class="grid grid-cols-2 gap-1 md:gap-4 lg:gap-8" id="photography-grid">
            </div>
        </section>

    </main>

    <footer class="w-full flex flex-col items-center justify-center py-8 lg:py-12 px-4 md:px-6 lg:px-20 bg-[#f9f9f9] mb-6">
        <div class="flex flex-row items-center space-y-0 space-x-6 md:space-x-12 mb-8">
            <a href="https://instagram.com/pvaliente_" target="_blank" rel="noopener noreferrer" class="font-['Syne'] text-[12px] tracking-widest uppercase text-neutral-500 hover:text-black transition-colors py-2 px-4 whitespace-nowrap">INSTAGRAM</a>
            <a href="https://www.behance.net/pvaliente" target="_blank" rel="noopener noreferrer" class="font-['Syne'] text-[12px] tracking-widest uppercase text-neutral-500 hover:text-black transition-colors py-2 px-4 whitespace-nowrap">BEHANCE</a>
            <a href="https://www.linkedin.com/in/valiente-pablo" target="_blank" rel="noopener noreferrer" class="font-['Syne'] text-[12px] tracking-widest uppercase text-neutral-500 hover:text-black transition-colors py-2 px-4 whitespace-nowrap">LINKEDIN</a>
        </div>
        <p class="font-['Syne'] text-[10px] tracking-widest uppercase text-neutral-600 text-center">
            &copy; <span id="footerYear"></span> PABLO VALIENTE. ALL RIGHTS RESERVED.
        </p>
    </footer>

    <script>
        document.getElementById('footerYear').textContent = new Date().getFullYear();

        (function () {
            const section = document.getElementById('frames-section');
            if (!section) return;
            const grid        = section.querySelector('#photography-grid');
            const projectPath = section.dataset.projectPath;
            const ext         = section.dataset.frameExt || 'webp';
            const altPrefix   = section.dataset.altPrefix || 'Frame';
            const maxFrames   = parseInt(section.dataset.maxFrames) || 8; 
            
            if (!grid || !projectPath) return;

            for (let i = 1; i <= maxFrames; i++) {
                const n = String(i).padStart(2, '0');
                const imgSrc = `${projectPath}/frame-${n}.${ext}`;
                
                const div = document.createElement('div');
                div.className = 'grid-item group aspect-[16/9] overflow-hidden bg-surface-container-low';
                
                const img = document.createElement('img');
                img.className = 'w-full h-full object-cover hover:scale-105 transition-all duration-700 ease-in-out';
                img.src     = imgSrc;
                img.alt     = altPrefix + ' — Frame ' + n;
                img.loading = 'lazy';
                
                img.onerror = function() {
                    this.parentElement.style.display = 'none';
                };

                div.appendChild(img);
                grid.appendChild(div);
            }
        })();

        const slider   = document.getElementById('slider');
        const prevBtn  = document.getElementById('prevBtn');
        const nextBtn  = document.getElementById('nextBtn');
        const slideData = [
            { title: 'NICHT SCHON WIEDER', sub: 'Personal Project' },
            { title: 'NICHT SCHON WIEDER', sub: 'Color Grade' }
        ];
        const labelTitle = document.getElementById('slide-label-title');
        const labelSub   = document.getElementById('slide-label-sub');

        function getScrollAmount() {
            const item = slider.querySelector('.snap-center');
            return item.clientWidth + (parseInt(window.getComputedStyle(slider).gap) || 0);
        }
        function updateLabel() {
            const idx     = Math.round(slider.scrollLeft / getScrollAmount());
            const clamped = Math.max(0, Math.min(idx, slideData.length - 1));
            labelTitle.textContent = slideData[clamped].title;
            labelSub.textContent   = slideData[clamped].sub;
        }

        const slidesWrap = document.querySelectorAll('.vimeo-slide-wrap');
        let isDragging = false;
        
        slidesWrap.forEach(wrap => {
            wrap.addEventListener('click', (e) => {
                if(isDragging) return; 
                const slide = wrap.closest('.snap-center');
                const sliderRect = slider.getBoundingClientRect();
                const slideRect = slide.getBoundingClientRect();
                const sliderCenter = sliderRect.left + sliderRect.width / 2;
                const slideCenter = slideRect.left + slideRect.width / 2;

                if (Math.abs(sliderCenter - slideCenter) > (slideRect.width / 3)) {
                    const offset = slideCenter - sliderCenter;
                    slider.scrollBy({ left: offset, behavior: 'smooth' });
                } else {
                    const clickX = e.clientX - slideRect.left;
                    if (clickX < slideRect.width / 2) {
                        slider.scrollBy({ left: -getScrollAmount(), behavior: 'smooth' });
                    } else {
                        slider.scrollBy({ left: getScrollAmount(), behavior: 'smooth' });
                    }
                }
            });
        });

        nextBtn.addEventListener('click', () => slider.scrollBy({ left:  getScrollAmount(), behavior: 'smooth' }));
        prevBtn.addEventListener('click', () => slider.scrollBy({ left: -getScrollAmount(), behavior: 'smooth' }));

        let scrollTimer;
        slider.addEventListener('scroll', () => { clearTimeout(scrollTimer); scrollTimer = setTimeout(updateLabel, 120); });
        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') slider.scrollBy({ left:  getScrollAmount(), behavior: 'smooth' });
            if (e.key === 'ArrowLeft')  slider.scrollBy({ left: -getScrollAmount(), behavior: 'smooth' });
        });

        // MODIFICADO: Solo rastreamos el arrastre para bloquear el click, sin forzar un "scrollBy" programático extra. 
        // El CSS `snap-mandatory` hace el trabajo de ajustar el slider de manera natural sin rebotes.
        slider.addEventListener('touchstart', () => { isDragging = false; }, { passive: true });
        slider.addEventListener('touchmove', () => { isDragging = true; }, { passive: true });
        slider.addEventListener('touchend', () => { setTimeout(() => { isDragging = false; }, 50); }, { passive: true });

        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const closeMenuBtn  = document.getElementById('close-menu-btn');
        const mobileOverlay = document.getElementById('mobile-overlay');
        function openMenu()  { mobileOverlay.classList.remove('hidden'); mobileOverlay.classList.add('flex'); mobileMenuBtn.setAttribute('aria-expanded','true');  document.body.classList.add('mobile-menu-open'); }
        function closeMenu() { mobileOverlay.classList.add('hidden');    mobileOverlay.classList.remove('flex'); mobileMenuBtn.setAttribute('aria-expanded','false'); document.body.classList.remove('mobile-menu-open'); }
        mobileMenuBtn.addEventListener('click', openMenu);
        closeMenuBtn.addEventListener('click',  closeMenu);
        mobileOverlay.querySelectorAll('a').forEach(a => a.addEventListener('click', closeMenu));

        (function() {
            const navScroll  = document.querySelector('.nav-scroll');
            const activeLink = navScroll ? navScroll.querySelector('a.text-black') : null;
            if (navScroll && activeLink) navScroll.scrollLeft = activeLink.offsetLeft - navScroll.offsetWidth / 2 + activeLink.offsetWidth / 2;
        })();
    </script>
</body>
</html>
