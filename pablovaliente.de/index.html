<script>
(function(){
  var s = document.createElement('script');
  s.src = 'https://player.vimeo.com/api/player.js';
  s.async = true;
  s.onload = function(){ window._vimeoReady = true; document.dispatchEvent(new Event('vimeo:ready')); };
  document.head.appendChild(s);
})();
</script>

<style>
  :root {
    --bg:     #ffffff;
    --black:  #0C0C0B;
    --white:  #FFFFFF;
    --ease:   cubic-bezier(0.16, 1, 0.3, 1);
    --radius: 8px;
    --card-w: min(70vw, 984px);
    --card-h: calc(var(--card-w) * 9 / 16);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :focus-visible { outline: 2px solid #A8895A; outline-offset: 3px; }
  html, body { width: 100%; height: 100%; }
  body { font-family: 'Syne', sans-serif; background: var(--bg); -webkit-font-smoothing: antialiased; cursor: none; overflow: hidden; }

  /* ── Custom cursor ── */
  #cur-arrow {
    position: fixed; z-index: 9999; pointer-events: none;
    transform: translate(-2px,-2px); transition: opacity .2s;
    will-change: left, top; opacity: 0;
  }
  #cur-arrow.is-ready { opacity: 1; }
  #cur-open {
    position: fixed; z-index: 9999; width: 68px; height: 68px; border-radius: 50%;
    background: var(--black); pointer-events: none;
    transform: translate(-50%,-50%) scale(0); transition: transform .3s var(--ease);
    display: flex; align-items: center; justify-content: center;
  }
  #cur-open span { font-size: 8px; font-weight: 800; letter-spacing: .25em; text-transform: uppercase; color: var(--white); }
  body.on-card #cur-arrow { opacity: 0; }
  body.on-card #cur-open  { transform: translate(-50%,-50%) scale(1); }
  body.on-interactive #cur-arrow { opacity: 0; }
  body.on-interactive #cur-open  { transform: translate(-50%,-50%) scale(.2); }
  body.on-interactive #cur-open span { display: none; }

  /* ── Grain ── */
  .grain {
    position: fixed; inset: 0; z-index: 9990; pointer-events: none; opacity: .025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 120px; animation: gr .35s steps(1) infinite;
  }
  @keyframes gr {
    0%  { transform: translate(0,0);    } 25% { transform: translate(-3%,2%);  }
    50% { transform: translate(2%,-3%); } 75% { transform: translate(-2%,3%);  }
  }

  /* ── Stage ── */
  .stage {
    position: fixed; inset: 0; z-index: 500;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .stage > *, .slider-col { pointer-events: auto; }

  /* ── DESKTOP SLIDER ── */
  .slider-col {
    position: relative;
    width: 100vw;
    height: var(--card-h);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    pointer-events: auto;
    opacity: 0;
    animation: fadeInUp .9s var(--ease) .2s forwards;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .slider-track {
    display: flex;
    align-items: center;
    gap: 24px;
    position: absolute; top: 0; left: 0; height: 100%;
    will-change: transform;
  }

  .card-wrap {
    flex-shrink: 0;
    width: var(--card-w); height: var(--card-h);
    transform: scale(.73); opacity: .55;
    transition: transform .75s var(--ease), opacity .5s var(--ease);
    transform-origin: center center;
    will-change: transform;
  }
  .card-wrap.is-active { transform: scale(1); opacity: 1; }

  .card {
    position: relative; width: 100%; aspect-ratio: 16 / 9;
    border-radius: var(--radius); overflow: hidden; background: #1a1510;
    cursor: none; transform: translateZ(0); backface-visibility: hidden; will-change: transform;
  }
  .card__media {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; border: 0; transform: scale(1.02); pointer-events: none;
  }
  .vimeo-thumb { z-index: 0; opacity: 0; transition: opacity .8s ease; }
  .video-layer { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
  .video-layer iframe {
    position: absolute; inset: 0; width: 100%; height: 100%; border: 0;
    transform: scale(1.02); opacity: 0; transition: opacity .5s var(--ease);
  }
  .card__overlay {
    position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background: linear-gradient(to bottom, rgba(0,0,0,0) 40%, rgba(0,0,0,.6) 100%);
    opacity: 0; transition: opacity .5s;
  }
  .card.is-active .card__overlay { opacity: 1; }

  .card__carousel { position: absolute; inset: 0; }
  .card__carousel-frame {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; transform: scale(1.02);
    opacity: 0; transition: opacity 1.1s ease;
    pointer-events: none; will-change: opacity;
  }
  .card__carousel-frame.is-active { opacity: 1; }

  /* ══════════════════════════════════
     MOBILE / TABLET  ≤ 1024px
  ══════════════════════════════════ */
  @media (max-width: 1024px) {
    #cur-arrow, #cur-open { display: none !important; }
    body { cursor: auto; overflow-x: hidden; } /* Prevenir desborde horizontal total */
    .card { cursor: pointer; }
    :root { --card-w: 82vw; }

    .slider-col {
      width: 100vw; /* Cambiado de 82vw a 100vw para centrar y corregir desborde */
      height: 100vh;
      overflow: visible;
      clip-path: none;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
      perspective-origin: center center;
    }

    .slider-track {
      position: relative;
      width: 100%;
      transform: none !important;
      transition: none !important;
      transform-style: preserve-3d;
    }

    .card-wrap {
      position: absolute;
      top: 50%; left: 0; right: 0;
      margin: 0 auto;
      pointer-events: none;
      /* Estado base para desborde visual */
      transform: translateY(-50%) translateY(60px) scale(0.78) rotateX(18deg);
      opacity: 0;
      transition: transform .7s var(--ease), opacity .55s var(--ease);
      will-change: transform, opacity;
      transform-origin: center bottom;
    }
    .card-wrap .card { height: auto; aspect-ratio: 16 / 9; }

    /* Centrado Vertical de la tarjeta activa */
    .card-wrap.is-active {
      position: absolute; top: 50%;
      transform: translateY(-50%) scale(1) rotateX(0deg);
      opacity: 1; pointer-events: auto; z-index: 10;
      transform-origin: center center;
    }

    .card-wrap.is-prev {
      transform: translateY(-50%) translateY(-42%) scale(0.82) rotateX(-22deg);
      opacity: 0.55; z-index: 5; pointer-events: none;
      transform-origin: center top;
    }

    .card-wrap.is-next {
      transform: translateY(-50%) translateY(42%) scale(0.82) rotateX(22deg);
      opacity: 0.55; z-index: 5; pointer-events: none;
      transform-origin: center bottom;
    }
  }

  @media (max-width: 768px) {
    :root { --card-w: 88vw; }
    .card-wrap.is-active { transform: translateY(-50%) scale(1) rotateX(0deg); }
  }
  @media (max-width: 480px) {
    :root { --card-w: 92vw; }
    .card-wrap.is-active { transform: translateY(-50%) scale(1) rotateX(0deg); }
  }

  /* ── Mobile menu overlay ── */
  @media (max-width: 1023px) {
    .mobile-menu-open { overflow: hidden; }
    #mobile-overlay { position: fixed !important; inset: 0 !important; width: 100vw !important; height: 100dvh !important; overflow: hidden !important; }
  }
  @media (hover: none) and (pointer: coarse) {
    a:hover, button:hover { color: inherit !important; }
  }
</style>

<script>
'use strict';

const curArrow = document.getElementById('cur-arrow');
const curOpen  = document.getElementById('cur-open');
let mx = 0, my = 0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  curArrow.style.left = mx + 'px'; curArrow.style.top = my + 'px';
  curOpen.style.left  = mx + 'px'; curOpen.style.top  = my + 'px';
  curArrow.classList.add('is-ready');
});
document.querySelectorAll('a, button').forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('on-interactive'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('on-interactive'));
});

const mobileMenuBtn = document.getElementById('mobile-menu-btn');
const closeMenuBtn  = document.getElementById('close-menu-btn');
const mobileOverlay = document.getElementById('mobile-overlay');
function openMenu()  { mobileOverlay.classList.remove('hidden'); mobileOverlay.classList.add('flex'); mobileMenuBtn.setAttribute('aria-expanded','true');  document.body.classList.add('mobile-menu-open'); }
function closeMenu() { mobileOverlay.classList.add('hidden');    mobileOverlay.classList.remove('flex'); mobileMenuBtn.setAttribute('aria-expanded','false'); document.body.classList.remove('mobile-menu-open'); }
mobileMenuBtn.addEventListener('click', openMenu);
closeMenuBtn.addEventListener('click',  closeMenu);
mobileOverlay.querySelectorAll('a').forEach(a => a.addEventListener('click', closeMenu));

const track  = document.getElementById('track');
const col    = document.getElementById('sliderCol');
const INTERVAL = 5000;

const realCards = Array.from(track.querySelectorAll('.card-wrap'));
const N = realCards.length;

realCards.forEach(c => {
  const ce = c.cloneNode(true); ce.classList.add('clone');
  ce.querySelector('[id]')?.removeAttribute('id');
  track.appendChild(ce);
});
realCards.forEach(c => {
  const cs = c.cloneNode(true); cs.classList.add('clone');
  cs.querySelector('[id]')?.removeAttribute('id');
  track.insertBefore(cs, realCards[0]);
});

const allCards = Array.from(track.querySelectorAll('.card-wrap'));
const OFFSET   = N;
let vCurrent   = OFFSET;
let timer      = null;
let isAnim     = false;

function realIdx(v) { return ((v - OFFSET) % N + N) % N; }
function isMobileSlider() { return window.innerWidth <= 1024; }

const thumbIds = [...new Set(
  Array.from(document.querySelectorAll('.vimeo-thumb[data-vimeo-id]'))
    .map(img => img.dataset.vimeoId)
)];
const activeId = allCards[vCurrent]?.querySelector('.vimeo-thumb')?.dataset.vimeoId;
const orderedThumbIds = activeId ? [activeId, ...thumbIds.filter(id => id !== activeId)] : thumbIds;

function fetchThumb(id) {
  fetch(`https://vimeo.com/api/oembed.json?url=https://vimeo.com/${id}&width=1280`)
    .then(r => r.json())
    .then(data => {
      const base = data.thumbnail_url.replace(/_\d+x\d+/, '');
      document.querySelectorAll(`.vimeo-thumb[data-vimeo-id="${id}"]`).forEach(img => {
        img.srcset = `${base}_640x360 640w, ${base}_960x540 960w, ${base}_1280x720 1280w`;
        img.sizes  = '(max-width:600px) 640px, (max-width:1024px) 960px, 1280px';
        img.src    = `${base}_1280x720`;
        img.style.opacity = '1';
      });
    }).catch(() => {});
}
if (orderedThumbIds.length) fetchThumb(orderedThumbIds[0]);
if (orderedThumbIds.length > 1) {
  const idle = typeof requestIdleCallback === 'function' ? requestIdleCallback : fn => setTimeout(fn, 250);
  idle(() => orderedThumbIds.slice(1).forEach(fetchThumb));
}

let _coverCard = null;
const _isMobile = window.innerWidth <= 1024 || /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
let _mobileUnlocked = false;

function _spawnCover(c) {
  if (c.classList.contains('clone')) return;
  const id = c.dataset.cover;
  if (!id) return;
  const vl = c.querySelector('.video-layer');
  if (!vl || vl.querySelector('iframe')) return;
  if (_isMobile && !_mobileUnlocked) return;
  if (!window._vimeoReady) {
    document.addEventListener('vimeo:ready', () => _spawnCover(c), { once: true });
    return;
  }
  const ifr = document.createElement('iframe');
  ifr.src = `https://player.vimeo.com/video/${id}?background=1&autoplay=1&loop=1&muted=1&autopause=0&quality=720p`;
  vl.appendChild(ifr);
  const player = new Vimeo.Player(ifr);
  vl._vPlayer = player;
  player.on('loaded', () => {
    if (c.classList.contains('is-active')) {
      player.play().then(() => { ifr.style.opacity = '1'; }).catch(() => {});
    }
  });
}

function _destroyCover(c) {
  const vl = c?.querySelector('.video-layer');
  if (!vl) return;
  const ifr = vl.querySelector('iframe');
  if (!ifr) return;
  try { vl._vPlayer?.unload(); } catch(_) {}
  ifr.remove(); vl._vPlayer = null;
}

function _activateCover(c) {
  if (_coverCard && _coverCard !== c) _destroyCover(_coverCard);
  _coverCard = c;
  _spawnCover(c);
  const vl = c.querySelector('.video-layer');
  const ifr = vl?.querySelector('iframe');
  if (vl?._vPlayer && ifr) {
    vl._vPlayer.play().then(() => { ifr.style.opacity = '1'; }).catch(() => {});
  }
}

function updateActive(v) {
  const ri = realIdx(v);
  allCards.forEach((c, idx) => {
    const active = idx === v;
    c.classList.toggle('is-active', active);
    c.querySelector('.card')?.classList.toggle('is-active', active);
    if (!active && !c.classList.contains('clone')) {
      const vl = c.querySelector('.video-layer');
      const ifr = vl?.querySelector('iframe');
      if (vl?._vPlayer && ifr) { vl._vPlayer.pause(); ifr.style.opacity = '0'; }
    }
  });
  _activateCover(realCards[ri]);
}

const CARD_GAP = 24;
function getTranslateX(v) {
  const colW = col.offsetWidth;
  let off = 0;
  for (let i = 0; i < v; i++) off += allCards[i].offsetWidth + CARD_GAP;
  const cardW = allCards[v].offsetWidth;
  return -(off - (colW / 2 - cardW / 2));
}

function goTo(v, animated = true) {
  if (isAnim && animated) return;
  isAnim = animated;
  updateActive(v);
  vCurrent = v;
  resetTimer();
  track.style.transition = animated ? 'transform .75s cubic-bezier(.16,1,.3,1)' : 'none';
  track.style.transform  = `translateX(${getTranslateX(v)}px)`;
}

track.addEventListener('transitionend', e => {
  if (e.propertyName !== 'transform') return;
  isAnim = false;
  if (vCurrent < OFFSET)           goTo(vCurrent + N, false);
  else if (vCurrent >= OFFSET + N) goTo(vCurrent - N, false);
});

function resetTimer() {
  clearInterval(timer);
  timer = setInterval(() => goTo(vCurrent + 1), INTERVAL);
}

function updateMobileStack(v) {
  allCards.forEach((c, idx) => {
    c.classList.remove('is-prev', 'is-next');
    if (idx === v - 1) c.classList.add('is-prev');
    if (idx === v + 1) c.classList.add('is-next');
  });
}

const _goToDesktop = goTo;
goTo = function(v, animated = true) {
  if (!isMobileSlider()) { _goToDesktop(v, animated); return; }
  if (isAnim && animated) return;
  isAnim = animated;
  updateActive(v);
  updateMobileStack(v);
  track.style.transition = 'none';
  track.style.transform  = 'none';
  vCurrent = v;
  resetTimer();
  if (animated) setTimeout(() => {
    isAnim = false;
    if (vCurrent < OFFSET)           goTo(vCurrent + N, false);
    else if (vCurrent >= OFFSET + N) goTo(vCurrent - N, false);
  }, 720);
  else isAnim = false;
};

function navigate() {
  const href = realCards[realIdx(vCurrent)].dataset.href;
  if (href) window.location.href = href;
}

document.addEventListener('click', e => {
  if (e.target.closest('header, button')) return;
  const rect = allCards[vCurrent].querySelector('.card').getBoundingClientRect();
  const onCard = mx >= rect.left && mx <= rect.right && my >= rect.top && my <= rect.bottom;
  if (onCard) navigate();
  else if (!isMobileSlider()) goTo(mx < window.innerWidth / 2 ? vCurrent - 1 : vCurrent + 1);
  else goTo(e.clientY < window.innerHeight / 2 ? vCurrent - 1 : vCurrent + 1);
});

col.addEventListener('click', e => {
  if (!isMobileSlider()) return;
  if (allCards[vCurrent]?.contains(e.target)) navigate();
});

let wheelAccum = 0, wheelReady = true;
col.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
  wheelAccum += delta;
  if (Math.abs(delta) < 2) { wheelReady = true; wheelAccum = 0; return; }
  if (wheelReady && Math.abs(wheelAccum) > 30) {
    wheelReady = false; wheelAccum = 0;
    goTo(delta > 0 ? vCurrent + 1 : vCurrent - 1);
  }
}, { passive: false });

document.addEventListener('keydown', e => {
  if (!isMobileSlider()) {
    if (e.key === 'ArrowRight') { e.preventDefault(); goTo(vCurrent + 1); }
    if (e.key === 'ArrowLeft')  { e.preventDefault(); goTo(vCurrent - 1); }
  } else {
    if (e.key === 'ArrowDown') { e.preventDefault(); goTo(vCurrent + 1); }
    if (e.key === 'ArrowUp')   { e.preventDefault(); goTo(vCurrent - 1); }
  }
});

let tX = 0, tY = 0;
col.addEventListener('touchstart', e => { tX = e.touches[0].clientX; tY = e.touches[0].clientY; }, { passive: true });
col.addEventListener('touchend', e => {
  const dx = tX - e.changedTouches[0].clientX;
  const dy = tY - e.changedTouches[0].clientY;
  if (!isMobileSlider()) {
    if (Math.abs(dx) > 30 && Math.abs(dx) > Math.abs(dy)) goTo(dx > 0 ? vCurrent + 1 : vCurrent - 1);
  } else {
    if (Math.abs(dy) > 30 && Math.abs(dy) > Math.abs(dx)) goTo(dy > 0 ? vCurrent + 1 : vCurrent - 1);
  }
}, { passive: true });

col.addEventListener('touchstart', () => {
  if (_mobileUnlocked) return;
  _mobileUnlocked = true;
  _activateCover(realCards[realIdx(vCurrent)]);
}, { once: true, passive: true });

window.addEventListener('load',   () => { goTo(OFFSET, false); resetTimer(); });
window.addEventListener('resize', () => goTo(vCurrent, false));

requestAnimationFrame(() => {
  document.querySelectorAll('.card__carousel').forEach(carousel => {
    const frames = Array.from(carousel.querySelectorAll('.card__carousel-frame'));
    if (frames.length < 2) return;
    let cur = 0;
    frames.forEach((f, i) => f.classList.toggle('is-active', i === 0));
    setInterval(() => {
      frames[cur].classList.remove('is-active');
      cur = (cur + 1) % frames.length;
      frames[cur].classList.add('is-active');
    }, 2800);
  });
});
</script>
</body>
