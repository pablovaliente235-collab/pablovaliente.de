<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pablo Valiente González – Fotograf, Videograf &amp; Drohnenpilot | Deutschland</title>
<meta name="description" content="Pablo Valiente González – Freelance Photographer, Videographer &amp; EU-certified Drone Pilot based in Germany."/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<script>
(function(){
  var s = document.createElement('script');
  s.src = 'https://player.vimeo.com/api/player.js';
  s.async = true;
  s.onload = function(){ window._vimeoReady = true; document.dispatchEvent(new Event('vimeo:ready')); };
  document.head.appendChild(s);
})();
</script>

<style>
  :root {
    --bg:     #ffffff;
    --black:  #0C0C0B;
    --white:  #FFFFFF;
    --ease:   cubic-bezier(0.16, 1, 0.3, 1);
    --radius: 8px;
    --card-w: min(70vw, 984px);
    --card-h: calc(var(--card-w) * 9 / 16);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; }
  body { font-family: 'Syne', sans-serif; background: var(--bg); -webkit-font-smoothing: antialiased; cursor: none; overflow: hidden; }

  /* ── Custom cursor ── */
  #cur-arrow { position: fixed; z-index: 9999; pointer-events: none; transform: translate(-2px,-2px); opacity: 0; transition: opacity .2s; }
  #cur-arrow.is-ready { opacity: 1; }
  #cur-open { position: fixed; z-index: 9999; width: 68px; height: 68px; border-radius: 50%; background: var(--black); pointer-events: none; transform: translate(-50%,-50%) scale(0); transition: transform .3s var(--ease); display: flex; align-items: center; justify-content: center; }
  #cur-open span { font-size: 8px; font-weight: 800; letter-spacing: .25em; text-transform: uppercase; color: var(--white); }
  body.on-card #cur-open { transform: translate(-50%,-50%) scale(1); }

  /* ── Grain ── */
  .grain { position: fixed; inset: 0; z-index: 9990; pointer-events: none; opacity: .025; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); animation: gr .35s steps(1) infinite; }
  @keyframes gr { 0% { transform: translate(0,0); } 25% { transform: translate(-3%,2%); } 50% { transform: translate(2%,-3%); } 75% { transform: translate(-2%,3%); } }

  .stage { position: fixed; inset: 0; z-index: 500; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .stage > *, .slider-col { pointer-events: auto; }

  /* ── SLIDER CONTAINER ── */
  .slider-col {
    position: relative; width: 100vw; height: var(--card-h); overflow: hidden;
    display: flex; align-items: center; justify-content: center; opacity: 0;
    animation: fadeInUp .9s var(--ease) .2s forwards;
  }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .slider-track { display: flex; align-items: center; gap: 24px; position: absolute; top: 0; left: 0; height: 100%; will-change: transform; }

  /* ── CARDS ── */
  .card-wrap { flex-shrink: 0; width: var(--card-w); height: var(--card-h); transform: scale(.73); opacity: .55; transition: transform .75s var(--ease), opacity .5s var(--ease); will-change: transform; }
  .card-wrap.is-active { transform: scale(1); opacity: 1; }

  .card { position: relative; width: 100%; aspect-ratio: 16 / 9; border-radius: var(--radius); overflow: hidden; background: #1a1510; transform: translateZ(0); }
  .card__media { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scale(1.02); pointer-events: none; }
  .vimeo-thumb { z-index: 0; opacity: 0; transition: opacity .8s ease; }
  .video-layer { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
  .video-layer iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; transform: scale(1.02); opacity: 0; transition: opacity .5s var(--ease); }
  .card__overlay { position: absolute; inset: 0; z-index: 2; pointer-events: none; background: linear-gradient(to bottom, rgba(0,0,0,0) 40%, rgba(0,0,0,.6) 100%); opacity: 0; transition: opacity .5s; }
  .card.is-active .card__overlay { opacity: 1; }

  .card__carousel { position: absolute; inset: 0; }
  .card__carousel-frame { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1.1s ease; }
  .card__carousel-frame.is-active { opacity: 1; }

  /* ── MOBILE / TABLET ── */
  @media (max-width: 1024px) {
    #cur-arrow, #cur-open { display: none !important; }
    body { cursor: auto; overflow-x: hidden; }
    :root { --card-w: 82vw; }

    .slider-col { width: 100vw; height: 100vh; perspective: 1200px; }
    .slider-track { width: 100%; height: 100%; display: block; transform: none !important; transform-style: preserve-3d; }

    .card-wrap {
      position: absolute; top: 50%; left: 0; right: 0; margin: 0 auto;
      transform: translateY(-50%) translateY(80px) scale(0.7) rotateX(15deg);
      opacity: 0; z-index: 1;
    }
    /* Tarjeta Central: Mayor z-index para evitar superposición */
    .card-wrap.is-active { transform: translateY(-50%) scale(1) rotateX(0deg); opacity: 1; z-index: 50; pointer-events: auto; }
    /* Secundarias */
    .card-wrap.is-prev { transform: translateY(-50%) translateY(-45%) scale(0.8) rotateX(-20deg); opacity: 0.5; z-index: 10; }
    .card-wrap.is-next { transform: translateY(-50%) translateY(45%) scale(0.8) rotateX(20deg); opacity: 0.5; z-index: 10; }
  }

  @media (max-width: 768px) { :root { --card-w: 88vw; } }
  @media (max-width: 480px) { :root { --card-w: 92vw; } }
</style>
</head>
<body class="antialiased">

<div class="grain"></div>
<div id="cur-arrow"><svg width="11" height="11"><polygon points="0,0 0,11 11,0" fill="#0C0C0B" stroke="#fff" stroke-width="1.2"/></svg></div>
<div id="cur-open"><span>Open</span></div>

<header class="fixed top-0 w-full z-[600] bg-white">
  <nav class="w-full flex items-center py-6 md:py-8 justify-between px-4 md:px-10">
    <a href="index.html" class="font-bold tracking-[0.25em] text-[11px] uppercase">PABLO VALIENTE</a>
    <button class="lg:hidden" id="mobile-menu-btn"><span class="material-symbols-outlined scale-125">menu</span></button>
    <div class="hidden lg:flex space-x-6">
      <a class="tracking-[0.2em] text-[9px] font-bold text-black/60 hover:text-black" href="film.html">FILM</a>
      <a class="tracking-[0.2em] text-[9px] font-bold text-black/60 hover:text-black" href="commercial.html">COMMERCIAL</a>
      <a class="tracking-[0.2em] text-[9px] font-bold text-black/60 hover:text-black" href="photography-monasterio.html">PHOTOGRAPHY</a>
      <a class="tracking-[0.2em] text-[9px] font-bold text-black/60 hover:text-black" href="contact.html">CONTACT</a>
    </div>
  </nav>
</header>

<div class="stage">
  <div class="slider-col" id="sliderCol">
    <div class="slider-track" id="track">
      <div class="card-wrap" data-cover="1169718635" data-href="film.html">
        <div class="card"><img class="card__media vimeo-thumb" data-vimeo-id="1169718635"/><div class="video-layer"></div><div class="card__overlay"></div></div>
      </div>
      <div class="card-wrap" data-cover="1170251945" data-href="film-colorgrading.html">
        <div class="card"><img class="card__media vimeo-thumb" data-vimeo-id="1170251945"/><div class="video-layer"></div><div class="card__overlay"></div></div>
      </div>
      <div class="card-wrap" data-cover="1169718441" data-href="commercial.html">
        <div class="card"><img class="card__media vimeo-thumb" data-vimeo-id="1169718441"/><div class="video-layer"></div><div class="card__overlay"></div></div>
      </div>
      <div class="card-wrap" data-cover="" data-href="photography-monasterio.html">
        <div class="card">
          <div class="card__carousel">
            <img class="card__carousel-frame is-active" src="assets/carrusel/project-01/frame-01.webp"/>
            <img class="card__carousel-frame" src="assets/carrusel/project-01/frame-02.webp"/>
            <img class="card__carousel-frame" src="assets/carrusel/project-01/frame-03.webp"/>
          </div>
          <div class="video-layer"></div><div class="card__overlay"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';

/* ── Cursor ── */
const curArrow = document.getElementById('cur-arrow'), curOpen = document.getElementById('cur-open');
let mx = 0, my = 0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  curArrow.style.left = mx+'px'; curArrow.style.top = my+'px';
  curOpen.style.left = mx+'px'; curOpen.style.top = my+'px';
  curArrow.classList.add('is-ready');
});

/* ── Slider Logic ── */
const track = document.getElementById('track'), col = document.getElementById('sliderCol');
const realCards = Array.from(track.querySelectorAll('.card-wrap')), N = realCards.length;
realCards.forEach(c => track.appendChild(c.cloneNode(true)));
realCards.forEach(c => track.insertBefore(c.cloneNode(true), track.firstChild));

const allCards = Array.from(track.querySelectorAll('.card-wrap'));
const OFFSET = N;
let vCurrent = OFFSET, isAnim = false, timer = null, _mobileUnlocked = false;

function isMobileSlider() { return window.innerWidth <= 1024; }
function realIdx(v) { return ((v - OFFSET) % N + N) % N; }

/* ── Vimeo Covers ── */
function _spawnCover(c) {
  const id = c.dataset.cover; if (!id || c.querySelector('iframe')) return;
  if (isMobileSlider() && !_mobileUnlocked) return;
  const vl = c.querySelector('.video-layer'), ifr = document.createElement('iframe');
  ifr.src = `https://player.vimeo.com/video/${id}?background=1&autoplay=1&loop=1&muted=1&quality=720p`;
  vl.appendChild(ifr);
  const p = new Vimeo.Player(ifr); vl._vPlayer = p;
  p.on('loaded', () => { if(c.classList.contains('is-active')) ifr.style.opacity = '1'; });
}

function updateActive(v) {
  allCards.forEach((c, idx) => {
    const active = idx === v;
    c.classList.toggle('is-active', active);
    if (isMobileSlider()) {
      c.classList.toggle('is-prev', idx === v - 1);
      c.classList.toggle('is-next', idx === v + 1);
    }
    if (active) _spawnCover(c);
    const ifr = c.querySelector('iframe');
    if (ifr) {
      if (active) { c.querySelector('.video-layer')._vPlayer?.play(); ifr.style.opacity = '1'; }
      else { c.querySelector('.video-layer')._vPlayer?.pause(); ifr.style.opacity = '0'; }
    }
  });
}

function goTo(v, animated = true) {
  if (isAnim && animated) return;
  isAnim = animated;
  updateActive(v);
  vCurrent = v;
  if (!isMobileSlider()) {
    track.style.transition = animated ? 'transform .75s var(--ease)' : 'none';
    const cardW = allCards[0].offsetWidth, gap = 24;
    track.style.transform = `translateX(${-(v * (cardW + gap) - (col.offsetWidth/2 - cardW/2))}px)`;
  } else {
    track.style.transform = 'none';
    if (animated) setTimeout(() => isAnim = false, 700);
  }
  resetTimer();
}

track.addEventListener('transitionend', () => {
  isAnim = false;
  if (vCurrent < OFFSET) goTo(vCurrent + N, false);
  if (vCurrent >= OFFSET + N) goTo(vCurrent - N, false);
});

function resetTimer() { clearInterval(timer); timer = setInterval(() => goTo(vCurrent + 1), 5000); }

/* ── Touch / Interaction ── */
let tY = 0;
col.addEventListener('touchstart', e => { 
  tY = e.touches[0].clientY;
  if (!_mobileUnlocked) { _mobileUnlocked = true; updateActive(vCurrent); }
}, {passive: true});

col.addEventListener('touchend', e => {
  const dy = tY - e.changedTouches[0].clientY;
  if (isMobileSlider() && Math.abs(dy) > 40) goTo(dy > 0 ? vCurrent + 1 : vCurrent - 1);
}, {passive: true});

document.addEventListener('click', e => {
  if (e.target.closest('header, button')) return;
  if (allCards[vCurrent].contains(e.target)) {
    const h = allCards[vCurrent].dataset.href; if(h) window.location.href = h;
  } else {
    goTo(mx < window.innerWidth/2 ? vCurrent - 1 : vCurrent + 1);
  }
});

/* ── Thumbs & Init ── */
function fetchThumb(id) {
  fetch(`https://vimeo.com/api/oembed.json?url=https://vimeo.com/${id}&width=1280`)
    .then(r => r.json()).then(d => {
      const b = d.thumbnail_url.replace(/_\d+x\d+/, '');
      document.querySelectorAll(`[data-vimeo-id="${id}"]`).forEach(img => { img.src = b+'_1280x720'; img.style.opacity = '1'; });
    });
}
[...new Set(allCards.map(c => c.querySelector('.vimeo-thumb')?.dataset.vimeoId).filter(Boolean))].forEach(fetchThumb);

window.onload = () => goTo(OFFSET, false);
window.onresize = () => goTo(vCurrent, false);

setInterval(() => {
  document.querySelectorAll('.card__carousel').forEach(car => {
    const f = car.querySelectorAll('.card__carousel-frame'), i = Array.from(f).findIndex(x => x.classList.contains('is-active'));
    f[i].classList.remove('is-active'); f[(i+1)%f.length].classList.add('is-active');
  });
}, 2800);
</script>
</body>
</html>
